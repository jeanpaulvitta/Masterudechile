<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con degradado azul -->
  <rect width="512" height="512" rx="110" fill="url(#gradient)"/>
  
  <!-- Definición del degradado -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ondas de agua (representando piscina) -->
  <path d="M50 280 Q 90 260, 130 280 T 210 280 T 290 280 T 370 280 T 450 280" 
        stroke="rgba(255,255,255,0.3)" 
        stroke-width="4" 
        fill="none"/>
  <path d="M50 320 Q 90 300, 130 320 T 210 320 T 290 320 T 370 320 T 450 320" 
        stroke="rgba(255,255,255,0.2)" 
        stroke-width="4" 
        fill="none"/>
  
  <!-- Nadador estilizado -->
  <g transform="translate(256, 200)">
    <!-- Cabeza -->
    <circle cx="0" cy="-30" r="35" fill="white"/>
    
    <!-- Cuerpo (línea principal) -->
    <path d="M 0 5 L 0 70" 
          stroke="white" 
          stroke-width="20" 
          stroke-linecap="round"/>
    
    <!-- Brazo nadando (estilo libre) -->
    <path d="M 0 20 Q 60 -10, 90 10" 
          stroke="white" 
          stroke-width="18" 
          stroke-linecap="round"/>
    
    <!-- Brazo atrás -->
    <path d="M 0 25 Q -50 40, -70 55" 
          stroke="white" 
          stroke-width="16" 
          stroke-linecap="round"/>
    
    <!-- Piernas -->
    <path d="M 0 70 Q 20 90, 35 110" 
          stroke="white" 
          stroke-width="16" 
          stroke-linecap="round"/>
    <path d="M 0 70 Q -20 90, -30 105" 
          stroke="white" 
          stroke-width="16" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Salpicaduras de agua -->
  <circle cx="380" cy="170" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="410" cy="185" r="6" fill="rgba(255,255,255,0.5)"/>
  <circle cx="395" cy="155" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="140" cy="240" r="7" fill="rgba(255,255,255,0.5)"/>
  <circle cx="120" cy="225" r="5" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Texto UCH en la parte inferior -->
  <text x="256" y="420" 
        font-family="Arial, sans-serif" 
        font-size="80" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">UCH</text>
  
  <!-- Texto Master pequeño -->
  <text x="256" y="455" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="rgba(255,255,255,0.9)" 
        text-anchor="middle">MASTER</text>
</svg>
